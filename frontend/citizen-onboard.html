<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Onboarding - GovShield</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-theme">
    <div class="login-container">
        <div class="login-box" style="max-width: 980px;">
            <div class="login-header">
                <h1>Citizen Onboarding</h1>
                <p>Register once, upload essential documents, and generate your GovShield beneficiary card</p>
            </div>
            <form id="onboardForm" class="login-form">
                <div class="onboard-grid">
                    <div class="form-group"><label>Aadhaar</label><input id="aadhaar" maxlength="12" required></div>
                    <div class="form-group"><label>PAN</label><input id="pan"></div>
                    <div class="form-group"><label>First Name</label><input id="firstName" required></div>
                    <div class="form-group"><label>Last Name</label><input id="lastName" required></div>
                    <div class="form-group"><label>Email</label><input id="email" type="email" required></div>
                    <div class="form-group"><label>Phone</label><input id="phoneNumber" required></div>
                    <div class="form-group"><label>Date of Birth</label><input id="dateOfBirth" type="date" required></div>
                    <div class="form-group"><label>Gender</label><input id="gender" required></div>
                    <div class="form-group full"><label>Address</label><input id="address" required></div>
                    <div class="form-group"><label>State</label><input id="state" required></div>
                    <div class="form-group"><label>District</label><input id="district" required></div>
                    <div class="form-group"><label>Pincode</label><input id="pincode" maxlength="6" required></div>
                    <div class="form-group"><label>Annual Income</label><input id="annualIncome" type="number" required></div>
                    <div class="form-group"><label>Employment Status</label><input id="employmentStatus" placeholder="EMPLOYED/UNEMPLOYED/SELF_EMPLOYED" required></div>
                    <div class="form-group"><label>Government Employee</label><select id="isGovernmentEmployee"><option value="false">No</option><option value="true">Yes</option></select></div>
                    <div class="form-group"><label>Below Poverty Line</label><select id="isBelowPovertyLine"><option value="false">No</option><option value="true">Yes</option></select></div>
                </div>

                <h3 style="margin:0.8rem 0;">Essential Document Upload</h3>
                <div class="doc-upload-row">
                    <div class="onboard-grid">
                        <div class="form-group"><label>Document Type</label><select class="docType"><option value="AADHAAR">Aadhaar</option><option value="PAN">PAN</option><option value="VOTER_ID">Voter ID</option><option value="RATION_CARD">Ration Card</option></select></div>
                        <div class="form-group"><label>Document Number</label><input class="docNumber"></div>
                        <div class="form-group full"><label>Choose File</label><input class="docFile" type="file" accept=".png,.jpg,.jpeg,.pdf,.txt" required></div>
                    </div>
                </div>
                <div class="doc-upload-row">
                    <div class="onboard-grid">
                        <div class="form-group"><label>Document Type</label><select class="docType"><option value="AADHAAR">Aadhaar</option><option value="PAN">PAN</option><option value="VOTER_ID" selected>Voter ID</option><option value="RATION_CARD">Ration Card</option></select></div>
                        <div class="form-group"><label>Document Number</label><input class="docNumber"></div>
                        <div class="form-group full"><label>Choose File</label><input class="docFile" type="file" accept=".png,.jpg,.jpeg,.pdf,.txt"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Register Citizen + Upload Documents</button>
                <div id="resultBox" style="margin-top:10px;"></div>
            </form>

            <div id="idCard" class="id-card" style="display:none;"></div>
            <button id="downloadCardBtn" class="btn btn-primary" style="margin-top:0.8rem;display:none;">Download Beneficiary Card</button>
            <p style="margin-top:10px;"><a href="login.html">Back to Login</a></p>
        </div>
    </div>

    <script src="js/runtime-config.js"></script>
    <script>
        const API_BASE_URL =
            (window.GOVSHIELD && window.GOVSHIELD.API_BASE_URL)
                ? window.GOVSHIELD.API_BASE_URL
                : 'http://localhost:8080/api';

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const result = reader.result || '';
                    const base64 = String(result).split(',').pop();
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function getCitizenPayload() {
            return {
                aadhaar: document.getElementById('aadhaar').value.replace(/\s+/g, '').trim(),
                pan: document.getElementById('pan').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                dateOfBirth: document.getElementById('dateOfBirth').value,
                gender: document.getElementById('gender').value,
                address: document.getElementById('address').value,
                state: document.getElementById('state').value,
                district: document.getElementById('district').value,
                pincode: document.getElementById('pincode').value,
                annualIncome: Number(document.getElementById('annualIncome').value),
                employmentStatus: document.getElementById('employmentStatus').value,
                isGovernmentEmployee: document.getElementById('isGovernmentEmployee').value === 'true',
                isBelowPovertyLine: document.getElementById('isBelowPovertyLine').value === 'true'
            };
        }

        async function uploadDocuments(citizenId) {
            const rows = Array.from(document.querySelectorAll('.doc-upload-row'));
            const uploads = [];
            for (const row of rows) {
                const fileInput = row.querySelector('.docFile');
                if (!fileInput || !fileInput.files || fileInput.files.length === 0) continue;
                const file = fileInput.files[0];
                const payload = {
                    citizenId,
                    documentType: row.querySelector('.docType').value,
                    documentNumber: row.querySelector('.docNumber').value,
                    fileName: file.name,
                    fileContentBase64: await fileToBase64(file)
                };

                const response = await fetch(`${API_BASE_URL}/citizen-documents/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-User-Role': 'CITIZEN' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.message || 'Document upload failed');
                }
                uploads.push(await response.json());
            }
            return uploads;
        }

        function renderIdCard(citizen) {
            const card = document.getElementById('idCard');
            card.style.display = 'block';
            card.innerHTML = `
                <h3>GovShield Beneficiary Card</h3>
                <div class="id-grid">
                    <div><strong>Name:</strong> ${citizen.firstName} ${citizen.lastName}</div>
                    <div><strong>UGID:</strong> ${citizen.ugid}</div>
                    <div><strong>Aadhaar:</strong> ${citizen.aadhaar}</div>
                    <div><strong>State:</strong> ${citizen.state}</div>
                    <div><strong>District:</strong> ${citizen.district}</div>
                    <div><strong>Status:</strong> ${citizen.verificationStatus || 'PENDING'}</div>
                </div>
            `;
            const btn = document.getElementById('downloadCardBtn');
            btn.style.display = 'inline-block';
            btn.onclick = () => {
                const lines = [
                    'GovShield Beneficiary Card',
                    `Name: ${citizen.firstName} ${citizen.lastName}`,
                    `UGID: ${citizen.ugid}`,
                    `Aadhaar: ${citizen.aadhaar}`,
                    `State: ${citizen.state}`,
                    `District: ${citizen.district}`,
                    `Verification: ${citizen.verificationStatus || 'PENDING'}`,
                    `Issued: ${new Date().toLocaleDateString()}`
                ];
                const blob = createSimplePdfBlob(lines);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${citizen.ugid}-beneficiary-card.pdf`;
                link.click();
                URL.revokeObjectURL(link.href);
            };
        }

        function createSimplePdfBlob(lines) {
            const textLines = lines.map((line, index) =>
                `BT /F1 12 Tf 50 ${780 - (index * 20)} Td (${escapePdfText(line)}) Tj ET`
            ).join('\n');
            const stream = `${textLines}\n`;

            const objects = [];
            objects.push('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');
            objects.push('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n');
            objects.push('3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Contents 5 0 R /Resources << /Font << /F1 4 0 R >> >> >>\nendobj\n');
            objects.push('4 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\nendobj\n');
            objects.push(`5 0 obj\n<< /Length ${stream.length} >>\nstream\n${stream}endstream\nendobj\n`);

            let pdf = '%PDF-1.4\n';
            const offsets = [0];
            for (const object of objects) {
                offsets.push(pdf.length);
                pdf += object;
            }

            const xrefStart = pdf.length;
            pdf += `xref\n0 ${objects.length + 1}\n`;
            pdf += '0000000000 65535 f \n';
            for (let i = 1; i <= objects.length; i++) {
                pdf += `${String(offsets[i]).padStart(10, '0')} 00000 n \n`;
            }
            pdf += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`;
            return new Blob([pdf], { type: 'application/pdf' });
        }

        function escapePdfText(value) {
            return String(value || '')
                .replace(/\\/g, '\\\\')
                .replace(/\(/g, '\\(')
                .replace(/\)/g, '\\)');
        }

        document.getElementById('onboardForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const resultBox = document.getElementById('resultBox');
            resultBox.textContent = 'Processing registration...';

            try {
                const payload = getCitizenPayload();
                const response = await fetch(`${API_BASE_URL}/citizens/onboard`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const citizen = await response.json();
                if (!response.ok) throw new Error(citizen.message || 'Onboarding failed');

                const docs = await uploadDocuments(citizen.id);
                resultBox.innerHTML = `<strong>Registration successful</strong><br>UGID: ${citizen.ugid}<br>Documents uploaded: ${docs.length}<br>Verification status: ${citizen.verificationStatus || 'UNDER_REVIEW'}`;
                renderIdCard(citizen);
            } catch (err) {
                resultBox.textContent = err.message;
            }
        });
    </script>
    <script src="js/chatbot.js"></script>
</body>
</html>
